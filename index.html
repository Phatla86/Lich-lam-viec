<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lб»Ӣch LГ m Viб»Үc - PhГЎt La</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    .shift-card { transition: all 0.2s ease-in-out; }
    .shift-card:hover { transform: translateY(-2px); }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

  <div class="max-w-7xl mx-auto px-4 py-8">
    <div class="flex flex-col md:flex-row justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
      <div>
        <h1 class="text-2xl font-bold text-indigo-600">рҹ“… Hб»Ҷ THб»җNG Lб»ҠCH LГҖM VIб»ҶC 4 CA</h1>
        <p class="text-slate-500 mt-1">NhГўn viГӘn: <span class="font-semibold text-slate-700">PhГЎt La</span></p>
      </div>
      <div class="mt-4 md:mt-0">
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Chб»Қn ThГЎng Xem Lб»Ӣch</label>
        <select id="monthFilter" onchange="renderSchedule()" class="bg-slate-100 border border-slate-200 text-slate-700 py-2 px-4 pr-8 rounded-xl font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500">
          </select>
      </div>
    </div>

    <div id="loading" class="flex flex-col items-center justify-center py-20 bg-white rounded-2xl shadow-sm border border-slate-200">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
      <p class="mt-4 text-slate-500 font-medium">Дҗang Д‘б»“ng bб»ҷ dб»Ҝ liб»Үu tб»« Google Sheet...</p>
    </div>

    <div id="scheduleContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 hidden">
      </div>
  </div>

  <script>
    // Bбә N DГҒN LINK CSV Vб»ӘA COPY б»һ BЖҜб»ҡC 1 VГҖO TRONG DбәӨU NGOбә¶C KГүP BГҠN DЖҜб»ҡI NГҖY
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSMgCPeNv8qFRUSeqb9fnTP12qGOUNcyhbrJwR4LvJifsw4bTsI6_XzR7-UugrHItla7CkCWC_rmYhd/pub?gid=1366034394&single=true&output=csv";

    let rawData = [];
    let processedData = {};

    window.onload = function() {
      // DГ№ng PapaParse Д‘б»ғ tбәЈi vГ  Д‘б»Қc file CSV tб»« Google
      Papa.parse(SHEET_CSV_URL, {
        download: true,
        complete: function(results) {
          rawData = results.data;
          processSheetData();
          initMonthSelector();
          document.getElementById('loading').classList.add('hidden');
          document.getElementById('scheduleContainer').classList.remove('hidden');
          renderSchedule();
        },
        error: function(err) {
          document.getElementById('loading').innerHTML = `<p class="text-red-500 font-bold">Lб»—i tбәЈi dб»Ҝ liб»Үu. Vui lГІng kiб»ғm tra lбәЎi link CSV.</p>`;
        }
      });
    };

    function processSheetData() {
      let currentMonth = "ThГЎng 1"; 

      for (let i = 0; i < rawData.length; i++) {
        let row = rawData[i];
        if (!row || !row[0]) continue;

        let cellStr = row[0].toString().trim();
        
        // Nhбәӯn diб»Үn phГўn tГЎch thГЎng (vd: === THГҒNG 1 ===)
        if (cellStr.toUpperCase().includes("THГҒNG") && !cellStr.toUpperCase().includes("NGГҖY")) {
          currentMonth = cellStr.replace(/[^a-zA-Z0-9 ГЎГ бәЈГЈбәЎДғбәҜбәұбәібәөбә·ГўбәҘбә§бә©бә«бәӯГ©ГЁбә»бәҪбә№ГӘбәҝб»Ғб»ғб»…б»ҮГӯГ¬б»үД©б»ӢГіГІб»ҸГөб»ҚГҙб»‘б»“б»•б»—б»ҷЖЎб»ӣб»қб»ҹб»Ўб»ЈГәГ№б»§Е©б»ҘЖ°б»©б»«б»ӯб»Ҝб»ұГҪб»іб»·б»№б»өД‘ГҒГҖбәўГғбә ДӮбә®бә°бәІбәҙбә¶ГӮбәӨбәҰбәЁбәӘбә¬ГүГҲбәәбәјбәёГҠбәҫб»Җб»Ӯб»„б»ҶГҚГҢб»ҲДЁб»ҠГ“Г’б»ҺГ•б»ҢГ”б»җб»’б»”б»–б»ҳЖ б»ҡб»ңб»һб» б»ўГҡГҷб»ҰЕЁб»ӨЖҜб»Ёб»Әб»¬б»®б»°Гқб»Іб»¶б»ёб»ҙДҗ]/g, '').trim(); 
          processedData[currentMonth] = [];
          continue;
        }

        if (cellStr.startsWith("NgГ y")) {
          if (!processedData[currentMonth]) {
            processedData[currentMonth] = [];
          }
          
          processedData[currentMonth].push({
            ngay: cellStr,
            thu: row[1] || '---',
            ten: row[2] || 'Trб»‘ng',
            ca1: { ten: "Ca SГЎng", chiTiet: row[3], diaDiem: row[4] },
            ca2: { ten: "Ca Chiб»Ғu", chiTiet: row[5], diaDiem: row[6] },
            ca3: { ten: "Ca Tб»‘i", chiTiet: row[7], diaDiem: row[8] },
            ca4: { ten: "Ca ДҗГӘm", chiTiet: row[9], diaDiem: row[10] },
            ghiChu: row[11] || ''
          });
        }
      }
    }

    function initMonthSelector() {
      const selector = document.getElementById('monthFilter');
      selector.innerHTML = '';
      Object.keys(processedData).forEach(m => {
        let opt = document.createElement('option');
        opt.value = m;
        opt.innerText = m;
        selector.appendChild(opt);
      });
    }

    function renderSchedule() {
      const selectedMonth = document.getElementById('monthFilter').value;
      const container = document.getElementById('scheduleContainer');
      container.innerHTML = '';

      const days = processedData[selectedMonth] || [];

      if (days.length === 0) {
        container.innerHTML = `<div class="col-span-full text-center py-10 text-slate-400">KhГҙng tГ¬m thбәҘy dб»Ҝ liб»Үu cho thГЎng nГ y.</div>`;
        return;
      }

      days.forEach(day => {
        let cardHTML = `
          <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-200 flex flex-col justify-between shift-card">
            <div>
              <div class="flex justify-between items-center mb-4 border-b border-slate-100 pb-2">
                <span class="text-lg font-bold text-slate-800">${day.ngay}</span>
                <span class="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-lg text-xs font-semibold uppercase">${day.thu}</span>
              </div>
              <div class="space-y-3">
                ${renderShiftBadge(day.ca1, 'bg-amber-50 text-amber-700 border-amber-200')}
                ${renderShiftBadge(day.ca2, 'bg-orange-50 text-orange-700 border-orange-200')}
                ${renderShiftBadge(day.ca3, 'bg-sky-50 text-sky-700 border-sky-200')}
                ${renderShiftBadge(day.ca4, 'bg-purple-50 text-purple-700 border-purple-200')}
              </div>
            </div>
            ${day.ghiChu ? `
              <div class="mt-4 pt-3 border-t border-dashed border-slate-200 text-xs text-slate-600 bg-slate-50 p-2 rounded-lg">
                рҹ“Ң <strong>Ghi chГә:</strong> ${day.ghiChu}
              </div>
            ` : ''}
          </div>
        `;
        container.insertAdjacentHTML('beforeend', cardHTML);
      });
    }

    function renderShiftBadge(ca, colorClass) {
      if (!ca.chiTiet && !ca.diaDiem) {
        return `
          <div class="flex justify-between items-center text-[11px] text-slate-400 px-2 py-1 bg-slate-50 rounded-lg border border-slate-100">
            <span>${ca.ten}</span>
            <span>Nghб»ү</span>
          </div>
        `;
      }
      return `
        <div class="p-3 rounded-xl border ${colorClass} flex flex-col gap-1 shadow-sm">
          <div class="flex justify-between items-center font-medium text-xs">
            <span class="uppercase tracking-wide">${ca.ten}</span>
            <span class="font-bold bg-white px-2 py-0.5 rounded shadow-sm">${ca.chiTiet || 'вң“ LГ m viб»Үc'}</span>
          </div>
          ${ca.diaDiem ? `<div class="text-[11px] font-medium flex items-center gap-1.5 mt-1 opacity-90"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>${ca.diaDiem}</div>` : ''}
        </div>
      `;
    }
  </script>
</body>
</html>
