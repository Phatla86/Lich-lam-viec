<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lб»Ӣch LГ m Viб»Үc Theo Tuбә§n - PhГЎt La</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    .shift-card { transition: all 0.2s ease-in-out; }
    .shift-card:hover { transform: translateY(-3px); }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

  <div class="max-w-7xl mx-auto px-4 py-8">
    
    <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200 gap-6">
      <div>
        <h1 class="text-2xl font-bold text-indigo-600 flex items-center gap-2">
          рҹ“… Hб»Ҷ THб»җNG Lб»ҠCH LГҖM VIб»ҶC Tб»ӘNG TUбәҰN
        </h1>
        <p class="text-slate-500 mt-1">NhГўn viГӘn: <span class="font-semibold text-slate-700">PhГЎt La</span></p>
      </div>
      
      <div class="flex flex-col sm:flex-row gap-4 w-full lg:w-auto">
        <div class="w-full sm:w-48">
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Chб»Қn ThГЎng</label>
          <select id="monthFilter" onchange="onMonthChange()" class="w-full bg-slate-100 border border-slate-200 text-slate-700 py-2.5 px-4 rounded-xl font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer">
            </select>
        </div>

        <div class="w-full sm:w-64">
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Chб»Қn Tuбә§n Xem Lб»Ӣch</label>
          <select id="weekFilter" onchange="renderSchedule()" class="w-full bg-slate-100 border border-slate-200 text-slate-700 py-2.5 px-4 rounded-xl font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer">
            </select>
        </div>
      </div>
    </div>

    <div id="loading" class="flex flex-col items-center justify-center py-20 bg-white rounded-2xl shadow-sm border border-slate-200">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
      <p class="mt-4 text-slate-500 font-medium">Дҗang Д‘б»“ng bб»ҷ lб»Ӣch lГ m viб»Үc trб»ұc tiбәҝp tб»« Google Sheet...</p>
    </div>

    <div id="scheduleContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 hidden">
      </div>

  </div>

  <script>
    // Bбә N HГғY DГҒN LINK CSV Cб»ҰA GOOGLE SHEET VГҖO TRONG DбәӨU NGOбә¶C KГүP DЖҜб»ҡI NГҖY
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSMgCPeNv8qFRUSeqb9fnTP12qGOUNcyhbrJwR4LvJifsw4bTsI6_XzR7-UugrHItla7CkCWC_rmYhd/pub?gid=1366034394&single=true&output=csv";

    let rawData = [];
    let processedData = {};

    window.onload = function() {
      if (SHEET_CSV_URL === "LINK_CSV_CUA_BAN_O_DAY") {
        document.getElementById('loading').innerHTML = `<p class="text-amber-600 font-bold p-4 text-center">Vui lГІng thay Д‘б»•i biбәҝn SHEET_CSV_URL trong mГЈ nguб»“n bбәұng link CSV thб»ұc tбәҝ tб»« Google Sheet cб»§a bбәЎn!</p>`;
        return;
      }

      Papa.parse(SHEET_CSV_URL, {
        download: true,
        complete: function(results) {
          rawData = results.data;
          processSheetData();
          initMonthSelector();
          document.getElementById('loading').classList.add('hidden');
          document.getElementById('scheduleContainer').classList.remove('hidden');
        },
        error: function(err) {
          document.getElementById('loading').innerHTML = `<p class="text-red-500 font-bold">Lб»—i kбәҝt nб»‘i. HГЈy Д‘бәЈm bбәЈo bбәЎn Д‘ГЈ "XuбәҘt bбәЈn lГӘn web" б»ҹ dбәЎng cГҙng khai .csv</p>`;
        }
      });
    };

    // Xб»ӯ lГҪ vГ  phГўn loбәЎi dб»Ҝ liб»Үu tб»« Sheet dб»Қc
    function processSheetData() {
      let currentMonth = ""; 

      for (let i = 0; i < rawData.length; i++) {
        let row = rawData[i];
        if (!row || !row[0]) continue;

        let cellStr = row[0].toString().trim();
        
        // PhГЎt hiб»Үn tiГӘu Д‘б»Ғ ThГЎng (vГӯ dб»Ҙ: === THГҒNG 1 ===)
        if (cellStr.toUpperCase().includes("THГҒNG") && !cellStr.toUpperCase().includes("NGГҖY")) {
          currentMonth = cellStr.replace(/[^a-zA-Z0-9 ГЎГ бәЈГЈбәЎДғбәҜбәұбәібәөбә·ГўбәҘбә§бә©бә«бәӯГ©ГЁбә»бәҪбә№ГӘбәҝб»Ғб»ғб»…б»ҮГӯГ¬б»үД©б»ӢГіГІб»ҸГөб»ҚГҙб»‘б»“б»•б»—б»ҷЖЎб»ӣб»қб»ҹб»Ўб»ЈГәГ№б»§Е©б»ҘЖ°б»©б»«б»ӯб»Ҝб»ұГҪб»іб»·б»№б»өД‘ГҒГҖбәўГғбә ДӮбә®бә°бәІбәҙбә¶ГӮбәӨбәҰбәЁбәӘбә¬ГүГҲбәәбәјбәёГҠбәҫб»Җб»Ӯб»„б»ҶГҚГҢб»ҲДЁб»ҠГ“Г’б»ҺГ•б»ҢГ”б»җб»’б»”б»–б»ҳЖ б»ҡб»ңб»һб» б»ўГҡГҷб»ҰЕЁб»ӨЖҜб»Ёб»Әб»¬б»®б»°Гқб»Іб»¶б»ёб»ҙДҗ]/g, '').trim(); 
          processedData[currentMonth] = [];
          continue;
        }

        // Дҗб»Қc cГЎc dГІng bбәҜt Д‘бә§u bбәұng chб»Ҝ "NgГ y"
        if (cellStr.startsWith("NgГ y") && currentMonth) {
          processedData[currentMonth].push({
            ngay: cellStr,
            thu: row[1] || '---',
            ten: row[2] || 'PhГЎt La',
            ca1: { ten: "Ca SГЎng", chiTiet: row[3], diaDiem: row[4] },
            ca2: { ten: "Ca Chiб»Ғu", chiTiet: row[5], diaDiem: row[6] },
            ca3: { ten: "Ca Tб»‘i", chiTiet: row[7], diaDiem: row[8] },
            ca4: { ten: "Ca ДҗГӘm", chiTiet: row[9], diaDiem: row[10] },
            ghiChu: row[11] || ''
          });
        }
      }
    }

    // Khб»ҹi tбәЎo danh sГЎch ThГЎng
    function initMonthSelector() {
      const selector = document.getElementById('monthFilter');
      selector.innerHTML = '';
      
      Object.keys(processedData).forEach(m => {
        let opt = document.createElement('option');
        opt.value = m;
        opt.innerText = m;
        selector.appendChild(opt);
      });

      // KГӯch hoбәЎt tГӯnh toГЎn tuбә§n cho thГЎng Д‘бә§u tiГӘn
      onMonthChange();
    }

    // Khi ngЖ°б»қi dГ№ng Д‘б»•i thГЎng -> Cбәӯp nhбәӯt lбәЎi bб»ҷ lб»Қc Tuбә§n tЖ°ЖЎng б»©ng
    function onMonthChange() {
      const selectedMonth = document.getElementById('monthFilter').value;
      const days = processedData[selectedMonth] || [];
      const weekSelector = document.getElementById('weekFilter');
      weekSelector.innerHTML = '';

      // Tб»ұ Д‘б»ҷng tГӯnh toГЎn chia danh sГЎch ngГ y thГ nh cГЎc block 7 ngГ y (1 tuбә§n)
      const totalDays = days.length;
      const totalWeeks = Math.ceil(totalDays / 7);

      for (let i = 0; i < totalWeeks; i++) {
        let startDay = i * 7 + 1;
        let endDay = Math.min((i + 1) * 7, totalDays);
        
        let opt = document.createElement('option');
        opt.value = i; // LЖ°u index cб»§a tuбә§n (0, 1, 2, 3, 4)
        opt.innerText = `Tuбә§n ${i + 1} (NgГ y ${startDay.toString().padStart(2, '0')} - ${endDay.toString().padStart(2, '0')})`;
        weekSelector.appendChild(opt);
      }

      // Render lб»Ӣch sau khi cбәӯp nhбәӯt bб»ҷ tuбә§n
      renderSchedule();
    }

    // Render danh sГЎch lб»Ӣch hiб»ғn thб»Ӣ chuбә©n 7 ngГ y theo Tuбә§n Д‘Ж°б»Јc chб»Қn
    function renderSchedule() {
      const selectedMonth = document.getElementById('monthFilter').value;
      const weekIndex = parseInt(document.getElementById('weekFilter').value) || 0;
      const container = document.getElementById('scheduleContainer');
      container.innerHTML = '';

      const allMonthDays = processedData[selectedMonth] || [];
      
      // CбәҜt mбәЈng lбәҘy Д‘Гәng 7 ngГ y cб»§a tuбә§n Д‘Гі
      const startIdx = weekIndex * 7;
      const endIdx = startIdx + 7;
      const weekDays = allMonthDays.slice(startIdx, endIdx);

      if (weekDays.length === 0) {
        container.innerHTML = `<div class="col-span-full text-center py-10 text-slate-400">KhГҙng cГі lб»Ӣch lГ m viб»Үc cho tuбә§n nГ y.</div>`;
        return;
      }

      weekDays.forEach(day => {
        let cardHTML = `
          <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-200 flex flex-col justify-between shift-card">
            <div>
              <div class="flex justify-between items-center mb-4 border-b border-slate-100 pb-2">
                <span class="text-lg font-bold text-slate-800">${day.ngay}</span>
                <span class="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-lg text-xs font-bold uppercase tracking-wider">${day.thu}</span>
              </div>
              
              <div class="space-y-3">
                ${renderShiftBox(day.ca1, 'bg-amber-50 text-amber-800 border-amber-200')}
                ${renderShiftBox(day.ca2, 'bg-orange-50 text-orange-800 border-orange-200')}
                ${renderShiftBox(day.ca3, 'bg-sky-50 text-sky-800 border-sky-200')}
                ${renderShiftBox(day.ca4, 'bg-purple-50 text-purple-800 border-purple-200')}
              </div>
            </div>
            
            ${day.ghiChu ? `
              <div class="mt-4 pt-3 border-t border-dashed border-slate-200 text-xs text-slate-600 bg-slate-50 p-2.5 rounded-xl">
                рҹ“Ң <strong>Ghi chГә:</strong> ${day.ghiChu}
              </div>
            ` : ''}
          </div>
        `;
        container.insertAdjacentHTML('beforeend', cardHTML);
      });
    }

    // HГ m hiб»ғn thб»Ӣ hб»ҷp thГҙng tin tб»«ng ca lГ m viб»Үc
    function renderShiftBox(ca, colorClass) {
      // Nбәҝu khГҙng cГі nб»ҷi dung cГҙng viб»Үc vГ  khГҙng cГі Д‘б»Ӣa Д‘iб»ғm -> Hiб»ғn thб»Ӣ Nghб»ү
      if (!ca.chiTiet && !ca.diaDiem) {
        return `
          <div class="flex justify-between items-center text-[11px] text-slate-400 px-3 py-1.5 bg-slate-50 rounded-xl border border-slate-100">
            <span class="font-medium">${ca.ten}</span>
            <span class="opacity-60">Nghб»ү</span>
          </div>
        `;
      }
      return `
        <div class="p-3 rounded-xl border ${colorClass} flex flex-col gap-1 shadow-2xs">
          <div class="flex justify-between items-center font-medium text-xs">
            <span class="uppercase tracking-wider font-semibold opacity-90">${ca.ten}</span>
            <span class="font-bold bg-white px-2 py-0.5 rounded shadow-2xs">${ca.chiTiet || 'вң“ Дҗi lГ m'}</span>
          </div>
          ${ca.diaDiem ? `
            <div class="text-[11px] font-medium flex items-center gap-1 mt-0.5 opacity-90">
              <svg class="w-3 h-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
              </svg>
              <span>${ca.diaDiem}</span>
            </div>
          ` : ''}
        </div>
      `;
    }
  </script>
</body>
</html>
